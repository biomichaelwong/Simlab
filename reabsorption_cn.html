<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>HKDSE 生物 - 腎單位重吸收作用 </title>
    <style>
        :root { --primary-dark: #2c3e50; --notes-green: #27ae60; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            color: var(--primary-dark); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 20px; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .main-wrapper {
            display: flex; gap: 20px; background: rgba(255, 255, 255, 0.98);
            padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .canvas-graph-section { display: flex; flex-direction: column; gap: 15px; }
        #simCanvas, #graphCanvas { background-color: #ffffff; border-radius: 12px; border: 1px solid #eaeaea; }
        #simCanvas { width: 750px; height: 420px; background: linear-gradient(to bottom, #fdfbfb 0%, #ebedee 100%); }
        #graphCanvas { width: 750px; height: 180px; background-color: #f8fbfd; }
        
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #edf2f7; }
        .card h3 { margin: 0 0 10px 0; color: #d35400; font-size: 15px; border-bottom: 2px solid #f6e5d3; padding-bottom: 5px;}
        .legend-group h4 { color: #7f8c8d; margin: 8px 0 5px 0; font-size: 12px; font-weight: 600; }
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 13px; font-weight: 500; }
        .legend-icon { width: 22px; height: 22px; margin-right: 8px; filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.1));}
        
        .dse-notes { background: #fdfefe; border-left: 4px solid var(--notes-green); }
        .dse-notes h3 { color: var(--notes-green); border-bottom-color: #a9dfbf; }
        .dse-notes ul { margin: 0; padding-left: 15px; font-size: 13px; line-height: 1.4; color: #34495e; }
        .dse-notes li { margin-bottom: 5px; }
        .highlight { color: #d35400; font-weight: bold; }

        .slider-container { margin-top: 10px; }
        .slider-container label { font-size: 13px; font-weight: bold; color: #2980b9; display: flex; justify-content: space-between;}
        input[type=range] { width: 100%; margin-top: 8px; accent-color: #2980b9; }
        
        button {
            padding: 12px; font-size: 14px; font-weight: bold; width: 100%; margin-top: auto;
            background: linear-gradient(180deg, #5dade2, #2980b9); color: white;
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(41,128,185,0.3); }
    </style>
</head>
<body>

    <h1>尿的形成：重吸收作用與體液調節</h1>
    
    <div class="main-wrapper">
        <div class="canvas-graph-section">
            <canvas id="simCanvas"></canvas>
            <canvas id="graphCanvas"></canvas>
        </div>
        
        <div class="sidebar">
            <div class="card legend-group">
                <h3>💧 體液調節 (互動區)</h3>
                <div class="slider-container">
                    <label for="adhSlider"><span>抗利尿激素 (ADH):</span> <span id="adhVal">高 (80%)</span></label>
                    <input type="range" id="adhSlider" min="0" max="100" value="80">
                </div>
                <p style="font-size: 11px; color: #7f8c8d; margin: 5px 0 0 0;">(控制集尿管「水通道蛋白」的數量)</p>
            </div>

            <div class="card legend-group">
                <h3>🔬 濾液成分與 DSE 比例</h3>
                <div class="legend-item"><canvas class="legend-icon" id="icon-amino"></canvas><span>氨基酸: 100% 於 PCT (主動轉運)</span></div>
                <div class="legend-item"><canvas class="legend-icon" id="icon-glucose"></canvas><span>葡萄糖: 100% 於 PCT (主動轉運)</span></div>
                <div class="legend-item"><canvas class="legend-icon" id="icon-water"></canvas><span>水分: PCT(50%), LOH(10%), DCT(10%)</span></div>
                <div class="legend-item"><canvas class="legend-icon" id="icon-urea"></canvas><span>尿素: 50% 於 PCT (擴散作用)</span></div>
            </div>

            <div class="card dse-notes">
                <h3>📝 水分調節重點 (Osmoregulation)</h3>
                <ul>
                    <li><span class="highlight">水通道蛋白 (Aquaporins)</span>：集尿管的透水性取決於管壁上水通道蛋白的數量。</li>
                    <li><span class="highlight">ADH 機制</span>：ADH 刺激集尿管細胞將更多水通道蛋白插入細胞膜，增加水分重吸收，產生較少且濃縮的尿液。</li>
                </ul>
            </div>

            <button id="toggleBtn">暫停動畫 (Pause)</button>
        </div>
    </div>

<script>
    const simCanvas = document.getElementById('simCanvas');
    const simCtx = simCanvas.getContext('2d');
    const graphCanvas = document.getElementById('graphCanvas');
    const graphCtx = graphCanvas.getContext('2d');
    
    const dpr = window.devicePixelRatio || 1;
    const simWidth = 750; const simHeight = 420;
    const graphWidth = 750; const graphHeight = 180;
    
    simCanvas.width = simWidth * dpr; simCanvas.height = simHeight * dpr;
    simCanvas.style.width = simWidth + 'px'; simCanvas.style.height = simHeight + 'px';
    simCtx.scale(dpr, dpr);

    graphCanvas.width = graphWidth * dpr; graphCanvas.height = graphHeight * dpr;
    graphCanvas.style.width = graphWidth + 'px'; graphCanvas.style.height = graphHeight + 'px';
    graphCtx.scale(dpr, dpr);

    let isPlaying = true;
    let particles = [];
    
    const adhSlider = document.getElementById('adhSlider');
    const adhValText = document.getElementById('adhVal');
    let currentADH = 0.8;

    adhSlider.addEventListener('input', function() {
        currentADH = this.value / 100;
        let label = currentADH > 0.6 ? "高" : (currentADH > 0.3 ? "中" : "低");
        adhValText.textContent = `${label} (${this.value}%)`;
        updateGraphData();
    });

    class Track {
        constructor() { this.segments = []; this.totalLength = 0; }
        addLine(x1, y1, x2, y2) {
            let len = Math.hypot(x2-x1, y2-y1);
            this.segments.push({type:'line', x1, y1, x2, y2, len, accLen: this.totalLength + len});
            this.totalLength += len;
        }
        addArc(cx, cy, r, startAng, endAng, ccw) {
            let diff = endAng - startAng;
            if (!ccw && diff < 0) diff += Math.PI*2;
            if (ccw && diff > 0) diff -= Math.PI*2;
            let len = Math.abs(diff) * r;
            this.segments.push({type:'arc', cx, cy, r, startAng, endAng, ccw, diff, len, accLen: this.totalLength + len});
            this.totalLength += len;
        }
        getPos(d) {
            if (d < 0) d = 0; if (d > this.totalLength) d = this.totalLength;
            for(let seg of this.segments) {
                if (d <= seg.accLen) {
                    let localD = d - (seg.accLen - seg.len);
                    let t = localD / seg.len;
                    if (seg.type === 'line') {
                        let dx = seg.x2 - seg.x1, dy = seg.y2 - seg.y1; let len = Math.hypot(dx, dy);
                        return { x: seg.x1 + t*dx, y: seg.y1 + t*dy, nx: -dy/len, ny: dx/len };
                    } else {
                        let ang = seg.startAng + t*seg.diff;
                        return { x: seg.cx + seg.r * Math.cos(ang), y: seg.cy + seg.r * Math.sin(ang), nx: Math.cos(ang), ny: Math.sin(ang) };
                    }
                }
            }
            let last = this.segments[this.segments.length-1];
            return {x: last.x2 || last.cx + last.r, y: last.y2 || last.cy, nx:1, ny:0};
        }
    }

    const tubuleTrack = new Track();
    tubuleTrack.addLine(-20, 60, 200, 60);         
    tubuleTrack.addLine(200, 60, 200, 260);        
    tubuleTrack.addArc(245, 260, 45, Math.PI, 0, true); 
    tubuleTrack.addLine(290, 260, 290, 60);        
    tubuleTrack.addLine(290, 60, 480, 60);         
    tubuleTrack.addArc(480, 100, 40, 1.5*Math.PI, 2*Math.PI, false); 
    tubuleTrack.addLine(520, 100, 520, 420);       

    const bloodTrack = new Track();
    bloodTrack.addLine(-20, 105, 145, 105);        
    bloodTrack.addLine(145, 105, 145, 260);        
    bloodTrack.addArc(245, 260, 100, Math.PI, 0, true); 
    bloodTrack.addLine(345, 260, 345, 105);        
    bloodTrack.addLine(345, 105, 435, 105);        
    bloodTrack.addArc(435, 145, 40, 1.5*Math.PI, 2*Math.PI, false); 
    bloodTrack.addLine(475, 145, 475, 420);        

    const SECTIONS = {
        PCT: { name: '近曲小管', pStart: 0, pEnd: 220 },
        LOOP: { name: '亨利氏套', pStart: 220, pEnd: 761 }, 
        DCT: { name: '遠曲小管', pStart: 761, pEnd: 951 },
        CD:  { name: '集尿管', pStart: 951, pEnd: 1334 }
    };

    const TYPES = {
        GLUCOSE: { id: 'glucose', size: 6, color: '#9b59b6' }, 
        AMINO: { id: 'amino', size: 6, color: '#a9dfbf' }, // 新增氨基酸
        WATER: { id: 'water', size: 7 },               
        UREA: { id: 'urea', size: 5 }                 
    };

    // --- 繪圖工具 ---
    function drawHexagon(ctx, x, y, size, color) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - Math.PI / 6;
            ctx.lineTo(x + size * Math.cos(angle), y + size * Math.sin(angle));
        }
        ctx.closePath(); ctx.fillStyle = color; ctx.fill();
        ctx.lineWidth = 1; ctx.strokeStyle = '#5b2c6f'; ctx.stroke();
    }
    
    // 新增：繪製氨基酸 (淡綠色三角形)
    function drawTriangle(ctx, x, y, size, color) {
        ctx.beginPath();
        ctx.moveTo(x, y - size);
        ctx.lineTo(x + size + 1, y + size - 1);
        ctx.lineTo(x - size - 1, y + size - 1);
        ctx.closePath();
        ctx.fillStyle = color; ctx.fill();
        ctx.lineWidth = 1; ctx.strokeStyle = '#27ae60'; ctx.stroke();
    }

    function drawWater(ctx, x, y, size) {
        const radGrad = ctx.createRadialGradient(x-size*0.2, y-size*0.2, size*0.1, x, y, size);
        radGrad.addColorStop(0, '#5dade2'); radGrad.addColorStop(1, '#21618c');
        ctx.fillStyle = radGrad; ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffffff'; 
        ctx.beginPath(); ctx.arc(x-size*0.75, y-size*0.6, size*0.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x+size*0.75, y-size*0.6, size*0.5, 0, Math.PI*2); ctx.fill();
    }
    
    function drawUrea(ctx, x, y, size) {
        ctx.fillStyle = '#a1887f'; ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill();
        ctx.lineWidth = 1; ctx.strokeStyle = '#6d4c41'; ctx.stroke();
    }

    function drawParticle(ctx, p, x = p.x, y = p.y) {
        if (p.state === 'tubule' && p.progress < 0) return; 
        ctx.save();
        if(p.type.id === 'glucose') drawHexagon(ctx, x, y, p.type.size, p.type.color);
        else if(p.type.id === 'amino') drawTriangle(ctx, x, y, p.type.size, p.type.color);
        else if(p.type.id === 'water') drawWater(ctx, x, y, p.type.size);
        else if(p.type.id === 'urea') drawUrea(ctx, x, y, p.type.size);
        ctx.restore();
    }

    function drawPath(ctx, track, color, width, isDashed = false) {
        ctx.beginPath();
        for (let i=0; i<track.segments.length; i++) {
            let seg = track.segments[i];
            if (i === 0) {
                if (seg.type === 'line') ctx.moveTo(seg.x1, seg.y1);
                else ctx.moveTo(seg.cx + seg.r*Math.cos(seg.startAng), seg.cy + seg.r*Math.sin(seg.startAng));
            }
            if (seg.type === 'line') ctx.lineTo(seg.x2, seg.y2);
            else ctx.arc(seg.cx, seg.cy, seg.r, seg.startAng, seg.endAng, seg.ccw);
        }
        ctx.strokeStyle = color; ctx.lineWidth = width; 
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        if (isDashed) ctx.setLineDash([5, 10]); else ctx.setLineDash([]);
        ctx.stroke();
    }

    // --- 水通道蛋白 (Aquaporins) 系統 ---
    const MAX_CHANNELS = 8;
    const CD_START_Y = 140; 
    const CD_END_Y = 400;
    const CHANNEL_X = 500; // 集尿管左側壁，接近微血管的位置

    function getActiveChannels() {
        let activeCount = Math.round(currentADH * MAX_CHANNELS);
        let channels = [];
        for(let i=0; i<MAX_CHANNELS; i++) {
            let y = CD_START_Y + (i * (CD_END_Y - CD_START_Y) / (MAX_CHANNELS - 1));
            let p = 951 + (y - 100); // 將 y 座標轉回軌跡 progress (CD 從 p=951, y=100 開始)
            channels.push({ active: i < activeCount, y: y, p: p });
        }
        return channels;
    }

    function drawSimBackground() {
        simCtx.clearRect(0, 0, simWidth, simHeight);
        simCtx.fillStyle = '#bdc3c7'; simCtx.font = 'bold 12px Arial';
        simCtx.fillText("皮質區 (Cortex)", 620, 40);
        simCtx.beginPath(); simCtx.moveTo(0, 150); simCtx.lineTo(simWidth, 150);
        simCtx.setLineDash([8, 8]); simCtx.strokeStyle = 'rgba(0,0,0,0.1)'; simCtx.lineWidth = 2; simCtx.stroke(); simCtx.setLineDash([]);
        simCtx.fillText("髓質區 (Medulla)", 620, 170);

        drawPath(simCtx, bloodTrack, '#e74c3c', 22); 
        drawPath(simCtx, bloodTrack, '#fadbd8', 16); 
        drawPath(simCtx, tubuleTrack, '#f1c40f', 38); 
        drawPath(simCtx, tubuleTrack, '#fef9e7', 32); 

        simCtx.beginPath(); simCtx.strokeStyle = '#f39c12'; simCtx.lineWidth = 2;
        for(let x=0; x<190; x+=3) { simCtx.lineTo(x, 60 - 15 + Math.sin(x*1.5)*3); }
        simCtx.stroke();

        simCtx.fillStyle = '#2c3e50'; simCtx.font = 'bold 14px Arial';
        simCtx.fillText("PCT", 80, 30);
        simCtx.fillText("DCT", 380, 30);
        simCtx.fillText("集尿管", 550, 350);
        simCtx.fillStyle = '#e74c3c';
        simCtx.fillText("周圍微血管", 25, 135);
        
        // 畫出動態水通道蛋白 (=)
        let channels = getActiveChannels();
        let drawnFirst = false;
        channels.forEach(ch => {
            if (ch.active) {
                simCtx.beginPath();
                simCtx.strokeStyle = '#795548'; // 棕色
                simCtx.lineWidth = 3;
                simCtx.lineCap = 'butt';
                // 上橫線
                simCtx.moveTo(CHANNEL_X - 6, ch.y - 3.5);
                simCtx.lineTo(CHANNEL_X + 6, ch.y - 3.5);
                // 下橫線
                simCtx.moveTo(CHANNEL_X - 6, ch.y + 3.5);
                simCtx.lineTo(CHANNEL_X + 6, ch.y + 3.5);
                simCtx.stroke();

                if (!drawnFirst && ch.y > 160) {
                    simCtx.fillStyle = '#795548'; simCtx.font = 'bold 11px Arial';
                    simCtx.fillText("水通道蛋白", CHANNEL_X - 68, ch.y + 4);
                    drawnFirst = true;
                }
            }
        });
    }

    class Particle {
        constructor() { this.reset(); }

        reset() {
            let rand = Math.random();
            // 重新分配比例，加入氨基酸
            if(rand < 0.55) this.type = TYPES.WATER;      
            else if (rand < 0.70) this.type = TYPES.UREA; 
            else if (rand < 0.85) this.type = TYPES.GLUCOSE;               
            else this.type = TYPES.AMINO;

            this.progress = -(Math.random() * 120); 
            this.speed = 1.0 + Math.random() * 0.5; 
            this.state = 'tubule'; 
            this.offset = (Math.random() - 0.5) * 18; 
            this.hasReabsorbed = false;
            
            let fate = Math.random();
            this.absorbLocation = null;
            this.absorbProgress = 9999; 
            
            if (this.type.id === 'glucose' || this.type.id === 'amino') {
                this.absorbLocation = 'PCT';
                this.absorbProgress = SECTIONS.PCT.pStart + 15 + Math.random() * (SECTIONS.PCT.pEnd - SECTIONS.PCT.pStart - 30);
            } else if (this.type.id === 'urea') {
                if (fate < 0.50) { 
                    this.absorbLocation = 'PCT';
                    this.absorbProgress = SECTIONS.PCT.pStart + 20 + Math.random() * (SECTIONS.PCT.pEnd - SECTIONS.PCT.pStart - 40);
                }
            } else if (this.type.id === 'water') {
                if (fate < 0.50) { 
                    this.absorbLocation = 'PCT';
                    this.absorbProgress = SECTIONS.PCT.pStart + 20 + Math.random() * (SECTIONS.PCT.pEnd - SECTIONS.PCT.pStart - 40);
                } else if (fate < 0.60) { 
                    this.absorbLocation = 'LOOP';
                    this.absorbProgress = SECTIONS.LOOP.pStart + 20 + Math.random() * (SECTIONS.LOOP.pEnd - SECTIONS.LOOP.pStart - 40);
                } else if (fate < 0.70) { 
                    this.absorbLocation = 'DCT';
                    this.absorbProgress = SECTIONS.DCT.pStart + 10 + Math.random() * (SECTIONS.DCT.pEnd - SECTIONS.DCT.pStart - 20);
                } else { 
                    this.absorbLocation = 'CD';
                    // 隨機指派一個通道的索引 (0 到 MAX_CHANNELS-1)
                    this.targetChannelIndex = Math.floor(Math.random() * MAX_CHANNELS);
                }
            }
        }

        update() {
            if (this.state === 'tubule') {
                this.progress += this.speed;
                let pos = tubuleTrack.getPos(this.progress);
                this.x = pos.x + pos.nx * this.offset;
                this.y = pos.y + pos.ny * this.offset;

                if (!this.hasReabsorbed && this.absorbLocation) {
                    if (this.absorbLocation !== 'CD') {
                        if (this.progress >= this.absorbProgress) this.startAbsorption();
                    } else {
                        // 集尿管水通道蛋白的嚴格檢查
                        let channels = getActiveChannels();
                        let myChannel = channels[this.targetChannelIndex];
                        
                        // 如果到達該通道，且該通道是「開啟 (active)」狀態
                        if (myChannel && this.progress >= myChannel.p) {
                            if (myChannel.active) {
                                // 強制 Y 座標對齊通道，產生「精準穿過通道」的視覺效果
                                this.y = myChannel.y; 
                                this.startAbsorption();
                            } else {
                                // 通道沒開，水分流失，變成尿液
                                this.absorbLocation = null; 
                            }
                        }
                    }
                }
                if (this.progress > tubuleTrack.totalLength + 20) this.reset();
            } 
            else if (this.state === 'membraning') {
                this.membraningFrames++;
                let t = this.membraningFrames / 30.0;
                this.x = this.startX + (this.targetX - this.startX) * t;
                this.y = this.startY + (this.targetY - this.startY) * t;
                
                if ((this.type.id === 'glucose' || this.type.id === 'amino') && this.membraningFrames === 15) {
                    simCtx.save(); simCtx.fillStyle = '#d35400'; simCtx.font = 'bold 10px Arial';
                    simCtx.fillText("ATP", this.x+8, this.y); simCtx.restore();
                }

                if (this.membraningFrames >= 30) {
                    this.state = 'blood';
                    this.bloodProgress = this.progress * (bloodTrack.totalLength / tubuleTrack.totalLength);
                }
            } 
            else if (this.state === 'blood') {
                this.bloodProgress += this.speed * 1.5;
                let pos = bloodTrack.getPos(this.bloodProgress);
                this.x = pos.x + pos.nx * (this.offset * 0.5); 
                this.y = pos.y + pos.ny * (this.offset * 0.5);
                if (this.bloodProgress > bloodTrack.totalLength + 20) this.reset();
            }
        }

        startAbsorption() {
            this.state = 'membraning'; this.hasReabsorbed = true;
            this.startX = this.x; this.startY = this.y;
            this.membraningFrames = 0;
            let mappedBloodProgress = this.progress * (bloodTrack.totalLength / tubuleTrack.totalLength);
            let targetPos = bloodTrack.getPos(mappedBloodProgress);
            this.targetX = targetPos.x; 
            // 如果是集尿管的水，維持 Y 座標水平穿透過去
            this.targetY = (this.absorbLocation === 'CD') ? this.y : targetPos.y;
        }
    }

    // 增加一點粒子數量讓畫面更豐富
    for (let i = 0; i < 200; i++) { 
        let p = new Particle();
        p.progress = -(i * 8); 
        particles.push(p); 
    }

    let graphData = {};
    function updateGraphData() {
        // 葡萄糖與氨基酸趨勢相同，稍微錯開 0.02 讓兩條線都看得見
        graphData.glucose = [ {p:0, y:1}, {p: SECTIONS.PCT.pEnd, y: 0.01}, {p: 1334, y: 0.01} ];
        graphData.amino =   [ {p:0, y:0.98}, {p: SECTIONS.PCT.pEnd, y: -0.01}, {p: 1334, y: -0.01} ];
        
        graphData.urea = [ {p:0, y:1}, {p: SECTIONS.PCT.pEnd, y: 0.5}, {p: 1334, y: 0.5} ];
        
        let cdEndWater = 0.3 - (0.28 * currentADH); 
        graphData.water = [ 
            {p:0, y:1}, 
            {p: SECTIONS.PCT.pEnd, y: 0.50}, 
            {p: SECTIONS.LOOP.pEnd, y: 0.40}, 
            {p: SECTIONS.DCT.pEnd, y: 0.30}, 
            {p: 1334, y: Math.max(0.02, cdEndWater)} 
        ];
    }
    updateGraphData(); 

    function drawGraph() {
        graphCtx.clearRect(0, 0, graphWidth, graphHeight);
        graphCtx.save();
        
        graphCtx.strokeStyle = '#7f8c8d'; graphCtx.lineWidth = 1.5;
        graphCtx.beginPath(); graphCtx.moveTo(40, graphHeight - 20); graphCtx.lineTo(graphWidth - 10, graphHeight - 20); graphCtx.stroke();
        graphCtx.beginPath(); graphCtx.moveTo(40, 20); graphCtx.lineTo(40, graphHeight - 20); graphCtx.stroke();
        
        graphCtx.fillStyle = '#2c3e50'; graphCtx.font = 'bold 12px Arial';
        graphCtx.textAlign = 'right'; graphCtx.fillText("剩餘量", 38, 15);
        graphCtx.textAlign = 'center'; graphCtx.fillText("沿腎小管的位置 (軌跡展開)", graphWidth/2, graphHeight - 5);

        const mapX = (p) => 40 + (p / 1334) * (graphWidth - 60);

        Object.values(SECTIONS).forEach(sec => {
            let xPos = mapX(sec.pEnd);
            graphCtx.strokeStyle = 'rgba(189, 195, 199, 0.4)';
            graphCtx.beginPath(); graphCtx.moveTo(xPos, 20); graphCtx.lineTo(xPos, graphHeight - 20); graphCtx.stroke();
            graphCtx.fillStyle = '#7f8c8d'; graphCtx.font = '11px Arial';
            graphCtx.fillText(sec.name, mapX(sec.pStart) + (xPos - mapX(sec.pStart))/2, graphHeight - 25);
        });
        graphCtx.restore();

        const drawLine = (data, color, label, showLabel = true) => {
            graphCtx.save(); graphCtx.beginPath();
            graphCtx.lineWidth = 2.5; graphCtx.strokeStyle = color; graphCtx.lineJoin = 'round';
            const mapY = (val) => graphHeight - 20 - val * (graphHeight - 40); 
            
            graphCtx.moveTo(mapX(data[0].p), mapY(data[0].y));
            for (let i = 1; i < data.length; i++) graphCtx.lineTo(mapX(data[i].p), mapY(data[i].y));
            graphCtx.stroke();
            
            if (showLabel) {
                graphCtx.fillStyle = color; graphCtx.font = 'bold 12px Arial'; graphCtx.textAlign = 'right';
                const lastData = data[data.length - 1];
                let lblY = mapY(lastData.y) - 8;
                if (lblY < 20) lblY = 20; 
                graphCtx.fillText(label, mapX(lastData.p), lblY);
            }
            graphCtx.restore();
        };

        drawLine(graphData.amino, '#27ae60', "", false); // 不印標籤以免與葡萄糖重疊
        drawLine(graphData.glucose, '#9b59b6', "葡萄/氨基酸");
        drawLine(graphData.urea, '#8d6e63', "尿素 (剩 50%)");
        drawLine(graphData.water, '#5dade2', "水分 (隨 ADH 變動)");
    }

    function animate() {
        if (!isPlaying) return;
        drawSimBackground();
        particles.sort((a,b) => (a.state==='blood'?1:0) - (b.state==='blood'?1:0)); 
        particles.forEach(p => { p.update(); drawParticle(simCtx, p); });
        drawGraph();
        requestAnimationFrame(animate);
    }

    ['amino', 'glucose', 'water', 'urea'].forEach(id => {
        let cvs = document.getElementById(`icon-${id}`);
        cvs.width = 22 * dpr; cvs.height = 22 * dpr; cvs.style.width = '22px'; cvs.style.height = '22px';
        let cx = cvs.getContext('2d'); cx.scale(dpr, dpr);
        let typeObj = Object.values(TYPES).find(t => t.id === id);
        drawParticle(cx, { type: typeObj, progress: 1 }, 11, 11); 
    });

    document.getElementById('toggleBtn').onclick = function() {
        isPlaying = !isPlaying;
        this.textContent = isPlaying ? '繼續動畫 (Play)' : '暫停動畫 (Pause)';
        if (isPlaying) animate();
    };

    animate();
</script>
</body>
</html>
